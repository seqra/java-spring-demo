env:
  contexts:
    - name: openapi-import
      urls:
        - http://localhost:8081
      includePaths: []
      excludePaths:
        - http://localhost:8081/api/redirect/external$
  parameters:
    failOnError: false
    failOnWarning: false
    continueOnFailure: true
    progressToStdout: true
jobs:
  - type: openapi
    parameters:
      context: openapi-import
      targetUrl: http://localhost:8081
      apiUrl: http://localhost:8081/v3/api-docs
  - type: activeScan-config
    parameters:
      maxRuleDurationInMins: 0
      maxScanDurationInMins: 0
      maxAlertsPerRule: 0
      threadPerHost: 40
      handleAntiCSRFTokens: true
      injectPluginIdInHeader: true
    inputVectors:
      urlQueryStringAndDataDrivenNodes:
        enabled: true
        addParam: false
        odata: true
      postData:
        enabled: true
        multiPartFormData: true
        xml: true
        json:
          enabled: true
          scanNullValues: false
        googleWebToolkit: false
        directWebRemoting: false
      urlPath: true
      httpHeaders:
        enabled: true
        allRequests: false
      cookieData:
        enabled: true
        encodeCookieValues: false
      scripts: true
  - type: activeScan-policy
    parameters:
      name: full-scan-policy
    policyDefinition:
      defaultStrength: INSANE
      defaultThreshold: OFF
      rules:
        - id: 6
          threshold: MEDIUM
          strength: INSANE
        - id: 10048
          threshold: MEDIUM
          strength: INSANE
