      context: openapi-import
      policy: full-scan-policy
  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk/zap-output
      reportFile: 'zap_scan_results'
      reportTitle: ZAP Full Scan Report
      reportDescription: Full ZAP scan results for all imported API endpoints
    risks:
      - high
      - medium
    confidences:
      - high
      - medium
      - low
